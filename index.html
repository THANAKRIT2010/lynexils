<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>LYNEXILS</title>

<style>

body{
margin:0;
background:#0a1c2f;
color:white;
font-family:Segoe UI;
height:200vh;
display:flex;
align-items:center;
justify-content:center;
}

/* กล่องเว็บเดิม */

.card{

background:#102c46;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,.4);

}

.card h1{
color:#6dd5ff;
}

/* PLAYER */

.player{

position:fixed;
left:50%;
transform:translateX(-50%);
bottom:30px;

display:flex;
align-items:center;

background:white;
border-radius:50px;

padding:15px 25px;

box-shadow:0 15px 40px rgba(0,0,0,.2);

gap:20px;

width:520px;

color:black;

}

.cover{

width:55px;
height:55px;

border-radius:10px;

}

.info{

display:flex;
flex-direction:column;
width:120px;

}

.title{

font-weight:600;

}

.status{

font-size:12px;
color:gray;

}

.controls{

display:flex;
align-items:center;
gap:10px;

}

.controls button{

border:none;
background:#1e7bff;
color:white;

width:38px;
height:38px;

border-radius:50%;
cursor:pointer;
font-size:16px;

}

.controls button.small{

background:transparent;
color:black;

font-size:18px;

}

.volume input{
width:90px;
}

.close{
margin-left:auto;
cursor:pointer;
}

audio{
display:none;
}

</style>
</head>

<body>

<div class="card">

<h1>LYNEXILS</h1>
<p>เว็บไซต์ของ Thanakrit</p>

</div>

<!-- PLAYER -->

<div class="player" id="player">

<img class="cover"
src="https://img.youtube.com/vi/TkyhQqVBbWQ/hqdefault.jpg">

<div class="info">

<div class="title">ที่ผ่านมา</div>
<div class="status" id="status">PAUSED</div>

</div>

<div class="controls">

<button class="small">⏮</button>

<button id="play">▶</button>

<button class="small">⏭</button>

</div>

<div class="volume">

🔊

<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">

</div>

<div class="close" onclick="document.getElementById('player').style.display='none'">
✕
</div>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2023/03/07/audio_0f3f2a1f71.mp3">
</audio>

<script>

const music=document.getElementById("music")
const playBtn=document.getElementById("play")
const status=document.getElementById("status")
const volume=document.getElementById("volume")

let playing=false

playBtn.onclick=()=>{

if(!playing){

music.play()

playBtn.innerHTML="⏸"
status.innerHTML="PLAYING"

playing=true

}else{

music.pause()

playBtn.innerHTML="▶"
status.innerHTML="PAUSED"

playing=false

}

}

volume.oninput=()=>{

music.volume=volume.value

}

</script>

</body>
</html>
