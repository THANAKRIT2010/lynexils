<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Music Player</title>

<style>

body{
margin:0;
background:#f5f5f5;
font-family:Segoe UI;
height:200vh;
}

/* PLAYER */

.player{

position:fixed;
left:50%;
transform:translateX(-50%);
bottom:30px;

display:flex;
align-items:center;

background:white;
border-radius:50px;

padding:15px 25px;

box-shadow:0 15px 40px rgba(0,0,0,.2);

gap:20px;

width:520px;

}

.cover{

width:55px;
height:55px;

border-radius:10px;
object-fit:cover;

}

.info{

display:flex;
flex-direction:column;
width:120px;

}

.title{

font-weight:600;

}

.status{

font-size:12px;
color:gray;

}

.controls{

display:flex;
align-items:center;
gap:10px;

}

.controls button{

border:none;
background:#1e7bff;
color:white;

width:38px;
height:38px;

border-radius:50%;
cursor:pointer;
font-size:16px;

}

.controls button.small{

background:transparent;
color:black;

font-size:18px;

}

.volume{

display:flex;
align-items:center;
gap:10px;

}

.volume input{

width:90px;

}

.close{

margin-left:auto;
cursor:pointer;
font-size:18px;
color:#666;

}

iframe{
display:none;
}

</style>
</head>

<body>

<div class="player" id="player">

<img class="cover" src="https://img.youtube.com/vi/TkyhQqVBbWQ/hqdefault.jpg">

<div class="info">

<div class="title">ที่ผ่านมา</div>
<div class="status" id="status">PAUSED</div>

</div>

<div class="controls">

<button class="small">⏮</button>

<button id="play">▶</button>

<button class="small">⏭</button>

</div>

<div class="volume">

🔊

<input id="volume" type="range" min="0" max="100" value="50">

</div>

<div class="close" onclick="document.getElementById('player').style.display='none'">
✕
</div>

</div>

<iframe id="yt"></iframe>

<script>

let playing=false

const playBtn=document.getElementById("play")
const status=document.getElementById("status")
const yt=document.getElementById("yt")

playBtn.onclick=()=>{

if(!playing){

yt.src="https://www.youtube.com/embed/TkyhQqVBbWQ?autoplay=1&loop=1&playlist=TkyhQqVBbWQ"

playBtn.innerHTML="⏸"

status.innerHTML="PLAYING"

playing=true

}else{

yt.src=""

playBtn.innerHTML="▶"

status.innerHTML="PAUSED"

playing=false

}

}

</script>

</body>
</html>
