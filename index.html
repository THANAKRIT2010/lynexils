<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYNEXILS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:radial-gradient(circle at 50% 40%, #0b2c4d 0%, #03172b 40%, #010b15 100%);
color:#8ad7ff;
overflow-x:hidden;
text-align:center;
}

/* PARTICLES */
#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-2;
}

/* CARD */
.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(10px);
box-shadow:0 0 40px rgba(56,189,248,.3);
animation:float 6s ease-in-out infinite;
max-width:420px;
width:90%;
}

@keyframes float{
0%{transform:translate(-50%,-50%)}
50%{transform:translate(-50%,-54%)}
100%{transform:translate(-50%,-50%)}
}

.profile{
width:140px;
height:140px;
border-radius:50%;
border:3px solid #38bdf8;
box-shadow:0 0 20px #38bdf8,0 0 60px rgba(56,189,248,.7);
object-fit:cover;
}

h1{
font-size:32px;
letter-spacing:3px;
margin-top:12px;
color:#7dd3fc;
text-shadow:0 0 5px #38bdf8,0 0 20px #38bdf8,0 0 50px rgba(56,189,248,.7);
}

.line{
width:140px;
height:2px;
background:linear-gradient(90deg,transparent,#38bdf8,transparent);
margin:14px auto;
box-shadow:0 0 10px #38bdf8;
}

.desc{
font-size:14px;
margin-bottom:5px;
opacity:.9;
}

.btn{
display:inline-block;
margin:10px;
padding:12px 26px;
border-radius:12px;
background:rgba(56,189,248,.08);
border:1px solid #38bdf8;
color:#8ad7ff;
text-decoration:none;
box-shadow:0 0 15px rgba(56,189,248,.4);
transition:.25s;
}

.btn:hover{
background:#38bdf8;
color:#021220;
transform:translateY(-3px);
box-shadow:0 0 20px #38bdf8,0 0 40px #38bdf8;
}

/* MUSIC PLAYER */

.music-player{
position:fixed;
bottom:20px;
right:20px;
background:#ffffff;
color:#000;
border-radius:16px;
padding:10px 18px;
display:flex;
align-items:center;
gap:15px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
z-index:9999;
}

.music-player img{
width:45px;
height:45px;
border-radius:50%;
}

.music-title{
font-size:14px;
font-weight:600;
}

.music-status{
font-size:11px;
color:#555;
}

.controls{
display:flex;
align-items:center;
gap:10px;
}

.controls button{
border:none;
background:none;
font-size:18px;
cursor:pointer;
}

.play{
background:#1877f2;
color:white;
width:32px;
height:32px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.volume{
width:80px;
}

/* MOBILE */

@media (max-width:600px){

.container{
width:92%;
padding:25px;
}

.profile{
width:110px;
height:110px;
}

h1{
font-size:24px;
}

.desc{
font-size:12px;
}

.btn{
display:block;
width:100%;
margin:8px 0;
}

.music-player{
right:10px;
left:10px;
bottom:15px;
}

.music-player img{
width:35px;
height:35px;
}

.volume{
width:60px;
}

}

</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">

<img src="https://img1.pic.in.th/images/640295924_17881802595466056_305289795150674999_n.jpg" class="profile">

<h1 id="typing"></h1>

<div class="line"></div>

<div class="desc">ทางเข้า Discord และ Facebook / Instagram / TikTok</div>
<div class="desc">อย่าลืม กดติดตามกันน่ะครับ ><</div>

<br>

<a class="btn" href="https://discord.gg/zxYqekBMMF">Discord</a>
<a class="btn" href="https://www.facebook.com/ezmxy.xi.25448">Facebook</a>
<a class="btn" href="https://www.instagram.com/ezmxyxii/">Instagram</a>
<a class="btn" href="https://www.tiktok.com/@thanakrit14347">TikTok</a>

</div>

<!-- MUSIC PLAYER -->

<div class="music-player">

<img id="cover" src="https://img.youtube.com/vi/Fameo0cnJzI/mqdefault.jpg">

<div>
<div class="music-title">ที่ผ่านมา</div>
<div class="music-status" id="status">PAUSED</div>
</div>

<div class="controls">

<button onclick="prev()">
<i class="fa-solid fa-backward"></i>
</button>

<button class="play" onclick="togglePlay()" id="playbtn">
<i class="fa-solid fa-play"></i>
</button>

<button onclick="next()">
<i class="fa-solid fa-forward"></i>
</button>

<input type="range" min="0" max="100" value="50" class="volume" onchange="setVolume(this.value)">

</div>

</div>

<div id="player" style="display:none"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player
let playing=false

const songs=[
"Fameo0cnJzI",
"nLnp0tpZ0ok"
"hBfN0AkmrxE"
"KAY71h_2T0k"
]


let current=0

function onYouTubeIframeAPIReady(){
player=new YT.Player('player',{
height:'0',
width:'0',
videoId:songs[current],
playerVars:{
autoplay:0,
controls:0
}
})
}

function togglePlay(){

if(!playing){

player.playVideo()
document.getElementById("playbtn").innerHTML='<i class="fa-solid fa-pause"></i>'
document.getElementById("status").innerText="PLAYING"
playing=true

}else{

player.pauseVideo()
document.getElementById("playbtn").innerHTML='<i class="fa-solid fa-play"></i>'
document.getElementById("status").innerText="PAUSED"
playing=false

}

}

function next(){
current++
if(current>=songs.length) current=0
player.loadVideoById(songs[current])
document.getElementById("cover").src="https://img.youtube.com/vi/"+songs[current]+"/mqdefault.jpg"
}

function prev(){
current--
if(current<0) current=songs.length-1
player.loadVideoById(songs[current])
document.getElementById("cover").src="https://img.youtube.com/vi/"+songs[current]+"/mqdefault.jpg"
}

function setVolume(v){
player.setVolume(v)
}

</script>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>

particlesJS("particles-js",{
particles:{
number:{value:80},
color:{value:"#38bdf8"},
shape:{type:"circle"},
opacity:{value:.6},
size:{value:3},
line_linked:{enable:true,distance:150,color:"#38bdf8",opacity:.4},
move:{enable:true,speed:2}
}
})

const text="THANAKRIT PHOKAEW 2010"
let i=0

function typing(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i)
i++
setTimeout(typing,120)
}
}

typing()

</script>

</body>
</html>
