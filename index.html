<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYNEXILS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:radial-gradient(circle at 50% 40%, #0b2c4d 0%, #03172b 40%, #010b15 100%);
color:#8ad7ff;
overflow:hidden;
text-align:center;
}

/* PARTICLES */
#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-2;
}

/* CARD */
.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(10px);
box-shadow:0 0 40px rgba(56,189,248,.3);
animation:float 6s ease-in-out infinite;
max-width:420px;
width:90%;
}

@keyframes float{
0%{transform:translate(-50%,-50%)}
50%{transform:translate(-50%,-54%)}
100%{transform:translate(-50%,-50%)}
}

/* PROFILE */
.profile{
width:140px;
height:140px;
border-radius:50%;
border:3px solid #38bdf8;
box-shadow:0 0 20px #38bdf8,0 0 60px rgba(56,189,248,.7);
transition:.3s;
object-fit:cover;
}

.profile:hover{
transform:scale(1.08);
box-shadow:0 0 30px #38bdf8,0 0 100px rgba(56,189,248,.9);
}

/* TITLE */
h1{
font-size:32px;
letter-spacing:3px;
margin-top:12px;
color:#7dd3fc;
text-shadow:0 0 5px #38bdf8,0 0 20px #38bdf8,0 0 50px rgba(56,189,248,.7);
}

/* LINE */
.line{
width:140px;
height:2px;
background:linear-gradient(90deg,transparent,#38bdf8,transparent);
margin:14px auto;
box-shadow:0 0 10px #38bdf8;
}

.desc{
font-size:14px;
margin-bottom:5px;
opacity:.9;
}

/* BUTTON */
.btn{
display:inline-block;
margin:10px;
padding:12px 26px;
border-radius:12px;
background:rgba(56,189,248,.08);
border:1px solid #38bdf8;
color:#8ad7ff;
text-decoration:none;
box-shadow:0 0 15px rgba(56,189,248,.4);
transition:.25s;
}

.btn:hover{
background:#38bdf8;
color:#021220;
transform:translateY(-3px);
box-shadow:0 0 20px #38bdf8,0 0 40px #38bdf8;
}

/* MUSIC BUTTON */
.music-box{
position:fixed;
bottom:25px;
right:25px;
z-index:999;
}

#musicBtn{
background:rgba(56,189,248,.15);
border:1px solid #38bdf8;
color:#7dd3fc;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
box-shadow:0 0 10px #38bdf8;
}

/* STAR */
.star{
position:absolute;
width:2px;
height:60px;
background:linear-gradient(-45deg,#38bdf8,transparent);
animation:shoot 4s linear;
}

@keyframes shoot{
0%{transform:translate(0,0) rotate(-45deg)}
100%{transform:translate(-500px,500px) rotate(-45deg);opacity:0}
}

/* MOBILE */
@media (max-width:768px){

.container{
padding:25px;
}

.profile{
width:110px;
height:110px;
}

h1{
font-size:24px;
}

.btn{
display:block;
width:100%;
margin:8px 0;
}

.music-box{
bottom:15px;
right:15px;
}

}

</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">

<img src="https://img1.pic.in.th/images/640295924_17881802595466056_305289795150674999_n.jpg"profile">

<h1 id="typing"></h1>

<div class="line"></div>

<div class="desc">ทางเข้า Discord และ Facebook/instagram</div>
<div class="desc">อย่าลืม กดติดตามกันน่ะครับ >< </div>

<br>

<a class="btn" href="https://discord.gg/zxYqekBMMF">Discord</a>
<a class="btn" href="https://www.facebook.com/ezmxy.xi.25448">facebook</a>
<a class="btn" href="https://www.instagram.com/ezmxyxii/">instagram</a>
  
</div>

<div class="music-box">
<button id="musicBtn">🔊 Play Music</button>
</div>

<div id="player"></div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* PARTICLES */
particlesJS("particles-js",{
particles:{
number:{value:80},
color:{value:"#38bdf8"},
shape:{type:"circle"},
opacity:{value:.6},
size:{value:3},
line_linked:{enable:true,distance:150,color:"#38bdf8",opacity:.4},
move:{enable:true,speed:2}
}
})

/* TYPING */
const text="THANAKRIT PHOKAEW 2010"
let i=0

function typing(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i)
i++
setTimeout(typing,120)
}
}

typing()

/* SHOOTING STAR */
function star(){
const s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*window.innerWidth+"px"
s.style.top=Math.random()*window.innerHeight+"px"
document.body.appendChild(s)

setTimeout(()=>{
s.remove()
},4000)
}

setInterval(star,1500)

/* MUSIC */
let player
let playing=false

function onYouTubeIframeAPIReady(){

player=new YT.Player('player',{
height:'0',
width:'0',
videoId:'Fameo0cnJzI',
playerVars:{
'autoplay':0,
'controls':0,
'loop':1,
'playlist':'Fameo0cnJzI'
}
})

}

const btn=document.getElementById("musicBtn")

btn.onclick=()=>{

if(!playing){
player.playVideo()
btn.innerText="🔇 Stop Music"
playing=true
}
else{
player.pauseVideo()
btn.innerText="🔊 Play Music"
playing=false
}

}

</script>

</body>
</html>
